version: '3.9'

services:

  # ── MongoDB ────────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: sar_mongo
    restart: unless-stopped
    ports: ['27017:27017']
    volumes: ['mongo_data:/data/db']
    environment:
      MONGO_INITDB_DATABASE: sar_db

  # ── Redis ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: sar_redis
    restart: unless-stopped
    ports: ['6379:6379']

  # ── Backend (Node.js) ──────────────────────────────────────────────────────
  backend:
    build: ./backend
    container_name: sar_backend
    restart: unless-stopped
    ports: ['5000:5000']
    env_file: ./backend/.env
    environment:
      MONGO_URI: mongodb://mongo:27017/sar_db
      REDIS_URL: redis://redis:6379
      ML_SERVICE_URL: http://ml:8000
    depends_on: [mongo, redis]
    volumes: ['./backend:/app', '/app/node_modules']

  # ── ML Service (Python) ────────────────────────────────────────────────────
  ml:
    build: ./ml
    container_name: sar_ml
    restart: unless-stopped
    ports: ['8000:8000']
    env_file: ./backend/.env
    volumes: ['./ml:/app']
    command: gunicorn -w 2 -b 0.0.0.0:8000 app:app

  # ── Frontend (React) ───────────────────────────────────────────────────────
  frontend:
    build: ./frontend
    container_name: sar_frontend
    restart: unless-stopped
    ports: ['3000:80']
    depends_on: [backend]

volumes:
  mongo_data:
